name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Pinned to a let-go commit, not a tag: the client-shell WASM glue these
      # patch scripts target (markers, worker init protocol) landed after #245
      # and is not in any release yet (v1.10.0 predates it). Bump to a tagged
      # release once one ships with it.
      - name: Check out let-go (pinned)
        uses: actions/checkout@v4
        with:
          repository: nooga/let-go
          ref: 8087f9979f511a9dc89266c9d84a41af00d98287
          path: let-go-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install let-go
        run: go install github.com/nooga/let-go@8087f9979f511a9dc89266c9d84a41af00d98287

      # LETGO_SRC pins the WASM *runtime* to the same commit as the binary above;
      # without it `lg -w` compiles the runtime from let-go@latest (the old
      # v1.10.0 glue), which mismatches the binary's worker protocol.
      - name: Build WASM
        env:
          LETGO_SRC: ${{ github.workspace }}/let-go-src
        run: let-go -w dist main.lg

      - name: Patch COI startup guard
        run: let-go tools/patch_wasm_coi.lg

      - name: Bridge ?seed= for reproducible runs
        run: let-go tools/patch_wasm_seed.lg

      - name: Set up Node (smoke gate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install smoke dependencies
        working-directory: tests/browser
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Browser smoke (must boot to title screen)
        working-directory: tests/browser
        run: node smoke.mjs --dir ../../dist

      # Seeded determinism regression: boots /?seed=12345 and asserts the
      # seed-derived title — proving the ?seed= bridge AND wasm==native xxh3.
      # (The title-animation gate is the separate `smoke.mjs` step above /
      # the fixme test, pending nooga/xsofy#61.)
      - name: E2E seeded regression (@playwright/test)
        working-directory: tests/e2e
        run: |
          npm install --no-audit --no-fund
          npx playwright install chromium
          DIST="$GITHUB_WORKSPACE/dist" npx playwright test

      - name: Upload smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure
          path: tests/browser/smoke-failure.png
          if-no-files-found: ignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
