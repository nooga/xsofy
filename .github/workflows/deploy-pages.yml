name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install let-go
        run: go install github.com/nooga/let-go@v1.9.0

      - name: Build WASM
        run: let-go -w dist main.lg

      - name: Patch COI startup guard
        run: let-go tools/patch_wasm_coi.lg

      - name: Set up Node (smoke gate)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install smoke dependencies
        working-directory: tests/browser
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Browser smoke (must boot to title screen)
        working-directory: tests/browser
        run: node smoke.mjs --dir ../../dist

      - name: Upload smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure
          path: tests/browser/smoke-failure.png
          if-no-files-found: ignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
