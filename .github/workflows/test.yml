name: Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install let-go
        run: go install github.com/nooga/let-go@latest

      - name: Run tests
        run: let-go xsofy/test/run.lg

      - name: Compile smoke test
        run: let-go -b /tmp/xsofy main.lg
