name: Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Floor lane: the version is single-sourced from .let-go-version
          # (resolved below), so it can't drift from the Pages deploy pin.
          # xsofy needs js/url-param (#339, in xsofy.seed) and the -w-shell
          # none glue (#245), both shipped in the pinned release.
          - pin: true
            label: "pinned (deploy floor)"
            required: true
          - letgo: latest
            label: "latest (upstream smoke test)"
            required: false
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ !matrix.required }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Match the Pages deploy toolchain (deploy-pages.yml) so the floor
          # lane tests with the Go the shipped bundle is actually built with.
          go-version: '1.26'
          # This repo has no go.sum, so setup-go's module cache is inert;
          # the lg-binary cache below is what saves the compile.
          cache: false

      # The pinned lane reads .let-go-version; the latest lane resolves the
      # moving `latest` to its concrete version so the binary cache below can
      # key on it. One source of truth for the floor, shared with the deploy.
      - name: Resolve let-go version
        id: letgo
        run: |
          if [ "${{ matrix.pin }}" = "true" ]; then
            v="$(grep -v '^#' .let-go-version | grep . | head -1 | tr -d '[:space:]')"
          else
            v="$(go list -m -f '{{.Version}}' github.com/nooga/let-go@${{ matrix.letgo }})"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # No go.sum in this repo means no dependency-keyed Go cache, so every
      # run was compiling let-go from source (~1-3 min). Cache the built
      # binary keyed on the resolved version instead.
      - name: Cache lg binary
        id: lgcache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/let-go
          key: lg-bin-${{ runner.os }}-go1.26-${{ steps.letgo.outputs.version }}

      - name: Install let-go ${{ steps.letgo.outputs.version }}
        if: steps.lgcache.outputs.cache-hit != 'true'
        run: go install github.com/nooga/let-go@${{ steps.letgo.outputs.version }}

      - name: Print let-go info
        run: |
          which let-go
          let-go --version 2>/dev/null || true

      # The aggregate runner (run.lg) prints a sub-namespace load/compile error
      # but still exits 0, so a required test ns that fails to load is silently
      # masked. Compile each test ns directly first; any failure fails the job.
      - name: Compile-check test namespaces
        run: |
          for f in xsofy/test/*_test.lg xsofy/test/*_prop.lg; do
            echo "compile-check $f"
            let-go -c "/tmp/$(basename "$f" .lg).lgb" "$f" \
              || { echo "::error::$f failed to compile"; exit 1; }
          done

      - name: Run tests
        run: let-go xsofy/test/run.lg

      - name: Layer-1 runtime smoke
        run: LG=let-go python3 xsofy/test/check_smoke.py

      - name: Compile smoke test
        run: let-go -b /tmp/xsofy main.lg

      # Build the real shipping bundle (shell-less + xsofy shell + COI), not a
      # bare `lg -w`, so the smoke gate catches a broken shell graft before it
      # reaches the deploy.
      - name: WASM build smoke
        uses: ./.github/actions/build-wasm
        with:
          dist: /tmp/xsofy-dist
